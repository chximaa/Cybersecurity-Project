# Application Configuration
spring.application.name=security-jwt-api
server.port=8080
server.error.include-message=always

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/security_jwt_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:mysupersecurejwtsecretkeywithatleast256bitslength1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.security.jwt=DEBUG

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:5173

# Spring Security
spring.security.user.name=admin
spring.security.user.password=admin123